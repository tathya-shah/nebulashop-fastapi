{% extends "base.html" %}

{% block title %}Login - NebulaShop{% endblock %}
{% block page_title %}Login{% endblock %}
{% block page_subtitle %}Sign in to your account to track orders and checkout faster.{% endblock %}

{% block content %}
<section id="login-page" style="max-width: 400px; margin: 0 auto;">
  <form id="login-form" class="product-form">
    <div class="form-group">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" required placeholder="Enter username" />
    </div>
    <div class="form-group" style="position: relative;">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required placeholder="Enter password" />
      <span class="toggle-password" onclick="togglePassword('login-password')" style="position: absolute; right: 10px; top: 38px; cursor: pointer;">👁️</span>
    </div>
    <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Sign In</button>
  </form>
  <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
    Don't have an account? <a href="/register" style="color: var(--primary);">Sign up here</a>
  </p>
</section>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        if (response.ok) {
            window.location.href = '/';
        } else {
            const data = await response.json();
            if (typeof showToast !== 'undefined') {
                showToast(data.detail || 'Login failed', 'error');
            } else {
                alert(data.detail || 'Login failed');
            }
        }
    } catch (err) {
        console.error(err);
    }
});

function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>
{% endblock %}
